# calibration.yaml - calibration point definitions
#
# IMPORTANT: at LEAST 3 well-distributed points are needed for stable path loss fit.
# 2 points geometrically collapsed produces garbage (negative n, etc).
# 4 points in field-quadrant centers gives each AP near/mid/far distance coverage.
#
# Recommended 4-point pattern (14.5 x 8.5m field, z=0.8m squatting height):
#   cal_1 (3.6, 2.1)  -- left-bottom quadrant center, far from infra_1
#   cal_2 (10.9, 2.1) -- right-bottom, close to infra_2
#   cal_3 (3.6, 6.4)  -- left-top, close to infra_4
#   cal_4 (10.9, 6.4) -- right-top, close to infra_1
# Each AP sees roughly 3m / 6-7m / 11m -- good span for log10 fit.

points:
  cal_1:
    position: [3, 1.5, 0.1]
    csv_glob: "data/cal_1_*.csv"
  cal_2:
    position: [10.9, 2.1, 0.8]
    csv_glob: "data/cal_2_*.csv"
  cal_3:
    position: [3.6, 6.4, 0.8]
    csv_glob: "data/cal_3_*.csv"
  cal_4:
    position: [10.9, 6.4, 0.8]
    csv_glob: "data/cal_4_*.csv"
